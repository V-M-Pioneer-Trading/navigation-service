# application.properties

# ── SQLite datasource ──────────────────────────────────────────────────────────
# Set SQLITE_DB_PATH env var for production; defaults to ./data/navigation.db
spring.datasource.url=jdbc:sqlite:${SQLITE_DB_PATH:./data/navigation.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

# SQLite doesn't cope well with concurrent writers — keep pool size 1
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-timeout=30000

# Run schema.sql on every startup (uses CREATE TABLE IF NOT EXISTS so it is idempotent)
spring.sql.init.mode=always

# ── SpaceTraders upstream ──────────────────────────────────────────────────────
# All SpaceTraders calls route through st-gateway's shared rate budget
# (meta#1/meta#7) instead of hitting SpaceTraders directly.
spacetraders.base-url=${ST_GATEWAY_URL:http://localhost:3002}/proxy

# ── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:3000}

# ── Server ─────────────────────────────────────────────────────────────────────
server.port=8080

# ── OpenAPI / Swagger UI ───────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
